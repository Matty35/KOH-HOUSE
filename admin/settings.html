        <a href="settings.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      </nav>
      <div class="sidebar-bottom">
        <a href="/" target="_blank" class="view-site-btn">View Live Site ↗</a>
        <button id="logout-btn" class="logout-btn">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

      <div class="admin-header">
        <div>
          <h1 class="admin-page-title">Settings</h1>
          <p class="admin-page-sub">Manage your site configuration</p>
        </div>
        <button id="save-settings-btn" class="btn-admin-primary">Save Settings</button>
      </div>

      <div class="settings-grid">

        <!-- SITE DETAILS -->
        <div class="admin-card">
          <h2 class="admin-section-title">Site Details</h2>
          <div class="form-group">
            <label>Site Name</label>
            <input type="text" id="st-name" value="KOH HOUSE">
          </div>
          <div class="form-group">
            <label>Tagline</label>
            <input type="text" id="st-tagline">
          </div>
        </div>

        <!-- APPEARANCE -->
        <div class="admin-card">
          <h2 class="admin-section-title">Appearance</h2>
          <div class="form-row">
            <div class="form-group">
              <label>Accent Colour (Gold)</label>
              <div class="colour-picker-row">
                <input type="color" id="st-accent" value="#C9A84C" class="colour-input">
                <span id="st-accent-hex" class="colour-hex">#C9A84C</span>
                <div id="st-accent-preview" class="colour-preview" style="background:#C9A84C"></div>
              </div>
            </div>
            <div class="form-group">
              <label>Primary Text Colour</label>
              <div class="colour-picker-row">
                <input type="color" id="st-primary" value="#1a1a1a" class="colour-input">
                <span id="st-primary-hex" class="colour-hex">#1a1a1a</span>
                <div id="st-primary-preview" class="colour-preview" style="background:#1a1a1a"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- CONTACT DETAILS -->
        <div class="admin-card">
          <h2 class="admin-section-title">Contact Details</h2>
          <div class="form-group">
            <label>Contact Email</label>
            <input type="email" id="st-email">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="st-phone">
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea id="st-address" rows="3"></textarea>
          </div>
        </div>

        <!-- SOCIAL LINKS -->
        <div class="admin-card">
          <h2 class="admin-section-title">Social Media</h2>
          <div class="form-group">
            <label>Instagram URL</label>
            <input type="url" id="st-instagram" placeholder="https://instagram.com/...">
          </div>
          <div class="form-group">
            <label>Facebook URL</label>
            <input type="url" id="st-facebook" placeholder="https://facebook.com/...">
          </div>
        </div>

        <!-- CHANGE PASSWORD -->
        <div class="admin-card">
          <h2 class="admin-section-title">Change Password</h2>
          <div id="password-message" class="hidden"></div>
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="st-current-pw">
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="st-new-pw">
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="st-confirm-pw">
          </div>
          <button id="change-password-btn" class="btn-admin-outline">Update Password</button>
        </div>

      </div>

      <div id="toast-container"></div>

    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOH HOUSE | Manage Artworks</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <a href="/admin/dashboard.html">KOH <span>HOUSE</span></a>
        <p>Admin Portal</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a href="artworks.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Artworks
        </a>
        <a href="artists.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Artists
        </a>
        <a href="homepage.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Homepage
        </a>
        <a href="settings.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="/" target="_blank" class="view-site-btn">View Live Site ↗</a>
        <button id="logout-btn" class="logout-btn">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

      <div class="admin-header">
        <div>
          <h1 class="admin-page-title">Artworks</h1>
          <p class="admin-page-sub">Manage your art collection</p>
        </div>
        <button id="add-artwork-btn" class="btn-admin-primary">+ Add New Artwork</button>
      </div>

      <!-- FILTERS -->
      <div class="table-filters">
        <input type="text" id="artwork-search" placeholder="Search artworks..." class="admin-search">
        <select id="artwork-genre-filter" class="admin-select">
          <option value="">All Genres</option>
          <option>Abstract</option>
          <option>Landscape</option>
          <option>Portrait</option>
          <option>Street Art</option>
          <option>Floral</option>
          <option>Contemporary</option>
          <option>Sculpture</option>
          <option>Mixed Media</option>
        </select>
        <select id="artwork-status-filter" class="admin-select">
          <option value="">All Status</option>
          <option value="true">Available</option>
          <option value="false">Sold</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">
        <table class="admin-table" id="artworks-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Artist</th>
              <th>Genre</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="artworks-tbody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </div>

      <!-- ADD/EDIT MODAL -->
      <div id="artwork-modal" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h3 id="artwork-modal-title">Add New Artwork</h3>
            <button class="modal-close" data-modal="artwork-modal">✕</button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="artwork-id">
            <div class="form-row">
              <div class="form-group">
                <label>Title *</label>
                <input type="text" id="aw-title" required>
              </div>
              <div class="form-group">
                <label>Artist *</label>
                <select id="aw-artist">
                  <!-- populated by JS from artists data -->
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Genre *</label>
                <select id="aw-genre">
                  <option>Abstract</option>
                  <option>Landscape</option>
                  <option>Portrait</option>
                  <option>Street Art</option>
                  <option>Floral</option>
                  <option>Contemporary</option>
                  <option>Sculpture</option>
                  <option>Mixed Media</option>
                </select>
              </div>
              <div class="form-group">
                <label>Medium *</label>
                <input type="text" id="aw-medium" placeholder="e.g. Oil on canvas">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Dimensions</label>
                <input type="text" id="aw-dimensions" placeholder="e.g. 60 x 80 cm">
              </div>
              <div class="form-group">
                <label>Edition</label>
                <input type="text" id="aw-edition" placeholder="e.g. 12 of 50 or Original">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Price (£) *</label>
                <input type="number" id="aw-price" placeholder="e.g. 1500">
              </div>
              <div class="form-group">
                <label>Available</label>
                <div class="toggle-wrapper">
                  <input type="checkbox" id="aw-available" class="toggle-input" checked>
                  <label for="aw-available" class="toggle-label"></label>
                  <span class="toggle-text">Available for sale</span>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>Image URL *</label>
              <input type="url" id="aw-image" placeholder="https://...">
              <div class="image-preview-wrapper">
                <img id="aw-image-preview" class="image-preview hidden" alt="Preview">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="aw-description" rows="3" placeholder="Gallery-quality description..."></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn-admin-outline" data-modal="artwork-modal">Cancel</button>
            <button id="save-artwork-btn" class="btn-admin-primary">Save Artwork</button>
          </div>
        </div>
      </div>

      <!-- DELETE CONFIRM MODAL -->
      <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h3>Confirm Delete</h3>
            <button class="modal-close" data-modal="delete-modal">✕</button>
          </div>
          <div class="modal-body">
            <p>Type <strong>DELETE</strong> to confirm removal of this artwork. This cannot be undone.</p>
            <input type="text" id="delete-confirm-input" placeholder="Type DELETE here" class="mt-16">
            <input type="hidden" id="delete-target-id">
          </div>
          <div class="modal-footer">
            <button class="btn-admin-outline" data-modal="delete-modal">Cancel</button>
            <button id="confirm-delete-btn" class="btn-admin-danger" disabled>Delete</button>
          </div>
        </div>
      </div>

      <div id="toast-container"></div>

    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>

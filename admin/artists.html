<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOH HOUSE | Manage Artists</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <a href="/admin/dashboard.html">KOH <span>HOUSE</span></a>
        <p>Admin Portal</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a href="artworks.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Artworks
        </a>
        <a href="artists.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Artists
        </a>
        <a href="homepage.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Homepage
        </a>
        <a href="settings.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-bottom">
        <a href="/" target="_blank" class="view-site-btn">View Live Site ↗</a>
        <button id="logout-btn" class="logout-btn">Sign Out</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

      <div class="admin-header">
        <div>
          <h1 class="admin-page-title">Artists</h1>
          <p class="admin-page-sub">Manage your artist portfolio</p>
        </div>
        <button id="add-artist-btn" class="btn-admin-primary">+ Add New Artist</button>
      </div>

      <div id="artists-grid" class="admin-artists-grid">
        <!-- populated by JS -->
      </div>

      <!-- ADD/EDIT MODAL -->
      <div id="artist-modal" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h3 id="artist-modal-title">Add New Artist</h3>
            <button class="modal-close" data-modal="artist-modal">✕</button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="artist-id">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="ar-name">
              </div>
              <div class="form-group">
                <label>Nationality</label>
                <input type="text" id="ar-nationality" placeholder="e.g. British">
              </div>
            </div>
            <div class="form-group">
              <label>Speciality *</label>
              <input type="text" id="ar-speciality" placeholder="e.g. Abstract Oil Paintings">
            </div>
            <div class="form-group">
              <label>Short Bio (one line, for cards)</label>
              <input type="text" id="ar-short-bio" placeholder="One sentence summary">
            </div>
            <div class="form-group">
              <label>Full Bio *</label>
              <textarea id="ar-bio" rows="4" placeholder="Gallery-quality biography..."></textarea>
            </div>
            <div class="form-group">
              <label>Profile Image URL *</label>
              <input type="url" id="ar-image" placeholder="https://...">
              <div class="image-preview-wrapper">
                <img id="ar-image-preview" class="image-preview hidden" alt="Preview">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn-admin-outline" data-modal="artist-modal">Cancel</button>
            <button id="save-artist-btn" class="btn-admin-primary">Save Artist</button>
          </div>
        </div>
      </div>

      <!-- DELETE CONFIRM MODAL -->
      <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h3>Confirm Delete</h3>
            <button class="modal-close" data-modal="delete-modal">✕</button>
          </div>
          <div class="modal-body">
            <p>Type <strong>DELETE</strong> to confirm.</p>
            <input type="text" id="delete-confirm-input" placeholder="Type DELETE here" class="mt-16">
            <input type="hidden" id="delete-target-id">
          </div>
          <div class="modal-footer">
            <button class="btn-admin-outline" data-modal="delete-modal">Cancel</button>
            <button id="confirm-delete-btn" class="btn-admin-danger" disabled>Delete</button>
          </div>
        </div>
      </div>

      <div id="toast-container"></div>

    </main>
  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>

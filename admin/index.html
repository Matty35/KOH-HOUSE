<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOH HOUSE | Admin Login</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-login-page">

  <div class="login-card">
    <div class="admin-logo">KOH <span>HOUSE</span></div>
    <p class="admin-subtitle">Admin Portal</p>

    <div id="login-error" class="login-error hidden"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="admin@kohhouse.com">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-with-toggle">
        <input type="password" id="password" placeholder="••••••••">
        <button type="button" id="toggle-password" aria-label="Show password">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button id="login-btn" class="btn-admin-primary">
      <span id="login-text">Sign In to KOH HOUSE</span>
      <span id="login-spinner" class="spinner hidden"></span>
    </button>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (sessionStorage.getItem('koh_token')) {
        window.location.href = '/admin/dashboard.html';
        return;
      }

      const loginBtn = document.getElementById('login-btn');
      const loginText = document.getElementById('login-text');
      const loginSpinner = document.getElementById('login-spinner');
      const loginError = document.getElementById('login-error');
      const togglePassword = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password');

      togglePassword.addEventListener('click', function () {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
      });

      loginBtn.addEventListener('click', async function () {
        const email = document.getElementById('email').value.trim();
        const password = passwordInput.value;

        loginError.classList.add('hidden');
        loginError.textContent = '';

        if (!email || !password) {
          loginError.textContent = 'Please enter your email and password';
          loginError.classList.remove('hidden');
          return;
        }

        loginSpinner.classList.remove('hidden');
        loginText.classList.add('hidden');
        loginBtn.disabled = true;

        try {
          const response = await fetch('/.netlify/functions/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          if (response.ok) {
            const data = await response.json();
            sessionStorage.setItem('koh_token', data.token);
            window.location.href = '/admin/dashboard.html';
          } else if (response.status === 401) {
            loginError.textContent = 'Invalid email or password';
            loginError.classList.remove('hidden');
          } else {
            loginError.textContent = 'Connection error, please try again';
            loginError.classList.remove('hidden');
          }
        } catch (err) {
          loginError.textContent = 'Connection error, please try again';
          loginError.classList.remove('hidden');
        } finally {
          loginSpinner.classList.add('hidden');
          loginText.classList.remove('hidden');
          loginBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
